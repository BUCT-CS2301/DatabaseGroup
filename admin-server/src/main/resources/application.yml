spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: admin-server
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
server:
  port: 8080

# 文物图片落盘目录；留空则开发模式下使用 classpath:relics-images（一般为 target/classes/relics-images）
app:
  jwt:
    # HS256 要求至少 32 字节；生产环境请通过环境变量 APP_JWT_SECRET 覆盖
    secret: ${APP_JWT_SECRET:dev-jwt-secret-key-at-least-32-chars!!}
    access-token-ttl-seconds: 7200
  auth:
    mock-token:
      enabled: false
    # dev 下对库中不存在的 mock userId 仍按 JWT claims 建立登录态
    trust-mock-token-claims: false
  relic-images:
    directory: ""
  # artifact_image 落盘文件对外 URL 基址；建议在 application-dev.yml 等环境文件中配置
  relics:
    image-public-base-url: ""
